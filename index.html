<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV Nacional</title>
  <script async src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --ink: #111111;
      --muted: #626975;
      --line: #111111;
      --soft-line: #d8dde5;
      --card: #ffffff;
      --player: #050608;
      --accent: #1677ff;
      --danger: #bf263c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 8px 14px 18px;
    }

    .topbar {
      height: 46px;
      border: 4px solid var(--line);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 8px;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .home {
      padding-top: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(160px, 280px) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .search {
      width: 100%;
      height: 38px;
      border: 2px solid var(--line);
      border-radius: 0;
      background: #ffffff;
      color: var(--ink);
      padding: 0 10px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .groups {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .group-button {
      flex: 0 0 auto;
      min-height: 38px;
      border: 2px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    .group-button.active {
      background: var(--ink);
      color: #ffffff;
    }

    .status {
      min-height: 22px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--danger);
    }

    .section-title {
      margin: 14px 0 10px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .recommended-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
      gap: 14px;
      align-items: start;
      margin-bottom: 18px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(116px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .channel-card {
      min-height: 104px;
      border: 4px solid var(--line);
      background: var(--card);
      color: var(--ink);
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(54px, 1fr) auto;
      gap: 7px;
      cursor: pointer;
      text-align: center;
    }

    .channel-card:hover,
    .channel-card:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .channel-card:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .channel-card.missing {
      background: #f1f3f6;
      border-color: #5f6672;
      color: #5f6672;
    }

    .badge {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 400;
    }

    .tv-icon {
      width: 68px;
      height: 46px;
      margin: 0 auto;
      border: 4px solid var(--line);
      background: #ffffff;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tv-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 18px;
      height: 4px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .logo {
      max-width: 52px;
      max-height: 32px;
      object-fit: contain;
      display: block;
    }

    .card-name {
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
    }

    .player-view {
      display: none;
      min-height: calc(100vh - 72px);
      padding-top: 16px;
      grid-template-rows: auto minmax(260px, 1fr) auto;
      gap: 10px;
    }

    .player-view.active {
      display: grid;
    }

    .player-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .back,
    .open-link {
      min-height: 38px;
      border: 3px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .channel-title {
      min-width: 0;
    }

    .channel-title h2 {
      margin: 0 0 3px;
      font-size: 20px;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .channel-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .screen {
      min-height: 300px;
      border: 4px solid var(--line);
      background: var(--player);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video,
    iframe {
      width: 100%;
      height: 100%;
      min-height: 300px;
      border: 0;
      background: var(--player);
    }

    .empty {
      padding: 22px;
      color: #d9dee8;
      text-align: center;
      line-height: 1.4;
    }

    .source {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .source a {
      color: var(--accent);
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .app {
        padding: 6px 8px 14px;
      }

      .topbar {
        top: 6px;
      }

      .toolbar,
      .player-head {
        grid-template-columns: 1fr;
      }

      .channel-grid {
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 10px;
      }

      .recommended-grid {
        grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
        gap: 10px;
      }

      .channel-card {
        min-height: 96px;
        border-width: 3px;
      }

      .tv-icon {
        width: 58px;
        height: 40px;
        border-width: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>tv</h1>
    </header>

    <section id="homeView" class="home">
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="Buscar canal">
        <nav id="groups" class="groups" aria-label="Categorias"></nav>
      </div>
      <p id="status" class="status">Cargando canales...</p>
      <h2 class="section-title">Recomendados</h2>
      <section id="recommended" class="recommended-grid" aria-label="Canales recomendados"></section>
      <h2 class="section-title">Todos</h2>
      <section id="channels" class="channel-grid" aria-label="Canales"></section>
    </section>

    <section id="playerView" class="player-view" aria-label="Reproductor">
      <div class="player-head">
        <button id="backButton" class="back" type="button">Volver</button>
        <div class="channel-title">
          <h2 id="channelName">Sin canal seleccionado</h2>
          <p id="channelInfo">Elige un canal para verlo.</p>
        </div>
        <a id="directLink" class="open-link" href="#" target="_blank" rel="noreferrer">Abrir enlace</a>
      </div>

      <section id="playerWrap" class="screen">
        <div class="empty">Selecciona un cuadro de canal para abrir esta pantalla.</div>
      </section>

      <p class="source">
        Datos de canales desde
        <a href="https://github.com/LaQuay/TDTChannels" target="_blank" rel="noreferrer">TDTChannels</a>.
      </p>
    </section>
  </div>

  <script>
    const DATA_URL = location.protocol.startsWith("http")
      ? "/api/tv"
      : "https://www.tdtchannels.com/lists/tv.json";

    const state = {
      groups: [],
      currentGroup: "Todos",
      currentChannel: null,
      hls: null
    };

    const els = {
      homeView: document.querySelector("#homeView"),
      playerView: document.querySelector("#playerView"),
      status: document.querySelector("#status"),
      groups: document.querySelector("#groups"),
      recommended: document.querySelector("#recommended"),
      channels: document.querySelector("#channels"),
      search: document.querySelector("#search"),
      playerWrap: document.querySelector("#playerWrap"),
      channelName: document.querySelector("#channelName"),
      channelInfo: document.querySelector("#channelInfo"),
      directLink: document.querySelector("#directLink"),
      backButton: document.querySelector("#backButton")
    };

    const recommendedRequests = [
      {
        title: "Televisa / Las Estrellas",
        terms: ["las estrellas", "televisa"],
        note: "sin m3u8 publico"
      },
      {
        title: "CNN en Espanol",
        terms: ["cnn internacional", "cnn en espanol", "cnn español"],
        note: "TDTChannels"
      },
      {
        title: "FRANCE24",
        terms: ["france 24", "france24"],
        note: "TDTChannels"
      },
      {
        title: "National Geographic",
        terms: ["national geographic", "nat geo"],
        note: "sin m3u8 publico"
      },
      {
        title: "DSports",
        terms: ["dsports", "d sports", "directv sports"],
        note: "sin m3u8 publico"
      }
    ];

    function getPlayableOption(channel) {
      return (channel.options || []).find((option) => {
        return ["m3u8", "mp4", "youtube", "stream"].includes(option.format) && option.url;
      });
    }

    function normalizeGroups(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.ambits)) return data.ambits;
      if (Array.isArray(data?.countries)) {
        return data.countries.flatMap((country) => country.ambits || []);
      }
      return [];
    }

    function getFilteredChannels() {
      const term = els.search.value.trim().toLowerCase();
      return state.groups
        .filter((group) => state.currentGroup === "Todos" || group.name === state.currentGroup)
        .flatMap((group) => {
          return (group.channels || []).map((channel) => ({ ...channel, groupName: group.name }));
        })
        .filter((channel) => {
          return !term || `${channel.name} ${channel.groupName}`.toLowerCase().includes(term);
        });
    }

    function allChannels() {
      return state.groups.flatMap((group) => {
        return (group.channels || []).map((channel) => ({ ...channel, groupName: group.name }));
      });
    }

    function findRecommendedChannel(request) {
      const channels = allChannels();
      return channels.find((channel) => {
        const haystack = `${channel.name} ${channel.groupName} ${channel.web || ""}`.toLowerCase();
        return request.terms.some((term) => haystack.includes(term));
      });
    }

    function renderGroups() {
      const names = ["Todos", ...state.groups.map((group) => group.name)];
      els.groups.innerHTML = "";

      names.forEach((name) => {
        const button = document.createElement("button");
        button.className = `group-button${name === state.currentGroup ? " active" : ""}`;
        button.type = "button";
        button.textContent = name;
        button.addEventListener("click", () => {
          state.currentGroup = name;
          renderGroups();
          renderChannels();
          updateStatus();
        });
        els.groups.appendChild(button);
      });
    }

    function renderChannels() {
      const channels = getFilteredChannels();
      els.channels.innerHTML = "";

      if (!channels.length) {
        els.channels.innerHTML = '<p class="status">No hay canales con ese filtro.</p>';
        return;
      }

      channels.forEach((channel) => {
        const option = getPlayableOption(channel);
        els.channels.appendChild(createChannelCard(channel, {
          title: channel.name,
          subtitle: option ? option.format.toUpperCase() : "web"
        }));
      });
    }

    function renderRecommended() {
      els.recommended.innerHTML = "";

      recommendedRequests.forEach((request) => {
        const channel = findRecommendedChannel(request);
        if (channel) {
          const option = getPlayableOption(channel);
          els.recommended.appendChild(createChannelCard(channel, {
            title: request.title,
            subtitle: option ? option.format.toUpperCase() : "web"
          }));
          return;
        }

        const button = document.createElement("button");
        button.className = "channel-card missing";
        button.type = "button";
        button.disabled = true;
        button.innerHTML = `
          <span class="tv-icon"></span>
          <span class="card-name">${request.title}<span class="badge">${request.note}</span></span>
        `;
        els.recommended.appendChild(button);
      });
    }

    function createChannelCard(channel, label) {
      const option = getPlayableOption(channel);
      const button = document.createElement("button");
      button.className = "channel-card";
      button.type = "button";
      button.disabled = !option && !channel.web;
      button.innerHTML = `
        <span class="tv-icon">
          ${channel.logo ? `<img class="logo" alt="" src="${channel.logo}">` : ""}
        </span>
        <span class="card-name">${label.title}<span class="badge">${label.subtitle}</span></span>
      `;
      button.addEventListener("click", () => selectChannel(channel));
      return button;
    }

    function updateStatus() {
      els.status.textContent = `${getFilteredChannels().length} canales`;
      els.status.classList.remove("error");
    }

    function showHome() {
      clearPlayer();
      els.playerView.classList.remove("active");
      els.homeView.style.display = "";
    }

    function showPlayer() {
      els.homeView.style.display = "none";
      els.playerView.classList.add("active");
    }

    function youtubeEmbedUrl(url) {
      try {
        const parsed = new URL(url);
        const channelMatch = parsed.pathname.match(/\/channel\/([^/]+)\/live/);
        if (channelMatch) {
          return `https://www.youtube.com/embed/live_stream?channel=${channelMatch[1]}&autoplay=1`;
        }
        const videoId = parsed.searchParams.get("v");
        return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1` : url;
      } catch {
        return url;
      }
    }

    function clearPlayer() {
      if (state.hls) {
        state.hls.destroy();
        state.hls = null;
      }
      els.playerWrap.innerHTML = '<div class="empty">Selecciona un cuadro de canal para abrir esta pantalla.</div>';
    }

    function playVideo(url, format) {
      clearPlayer();
      els.playerWrap.innerHTML = "";
      const video = document.createElement("video");
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      els.playerWrap.appendChild(video);

      if (format === "m3u8" && window.Hls && Hls.isSupported()) {
        state.hls = new Hls();
        state.hls.loadSource(url);
        state.hls.attachMedia(video);
      } else {
        video.src = url;
      }
    }

    function playFrame(url) {
      clearPlayer();
      els.playerWrap.innerHTML = "";
      const iframe = document.createElement("iframe");
      iframe.allow = "autoplay; encrypted-media; picture-in-picture";
      iframe.allowFullscreen = true;
      iframe.src = url;
      els.playerWrap.appendChild(iframe);
    }

    function selectChannel(channel) {
      state.currentChannel = channel;
      const option = getPlayableOption(channel);
      const directUrl = option?.url || channel.web || "#";

      els.channelName.textContent = channel.name;
      els.channelInfo.textContent = `${channel.groupName} - ${option ? option.format.toUpperCase() : "web"}`;
      els.directLink.href = directUrl;
      showPlayer();

      if (!option && channel.web) {
        playFrame(channel.web);
      } else if (option?.format === "youtube") {
        playFrame(youtubeEmbedUrl(option.url));
      } else if (option?.format === "stream") {
        playFrame(option.url);
      } else if (option) {
        playVideo(option.url, option.format);
      }
    }

    async function loadChannels() {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        const response = await fetch(DATA_URL, { cache: "no-store", signal: controller.signal });
        clearTimeout(timeout);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.groups = normalizeGroups(data);

        if (!state.groups.length) throw new Error("Lista sin grupos");
        updateStatus();
        renderGroups();
        renderRecommended();
        renderChannels();
      } catch (error) {
        els.status.textContent = "No se pudo cargar la lista. Abre la app con abrir-tv.bat y revisa tu conexion.";
        els.status.classList.add("error");
      }
    }

    els.search.addEventListener("input", () => {
      updateStatus();
      renderChannels();
    });

    els.backButton.addEventListener("click", showHome);

    loadChannels();
  </script>
</body>
</html>
